include:
  - "cicd-config/.rules-ci.yml"
  - "cicd-config/.variables-ci.yml"

stages:
  - clean
  - build
  - test
  - build-image
  - publish-image
  - deploy

clean:
  extends:
    - .common-rule
  image: $IMAGE_OPENJDK_MVN
  stage: clean
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
  script:
    - echo "Cleaning leftovers from previous builds"
    - mvn $MAVEN_CLI_OPTS clean -B

build:
  extends:
    - .common-rule
  image: docker:latest
  services:
    - docker:dind
  stage: build
  before_script:
    - docker version
    - docker compose version
  script:
    - echo "POSTGRES_URL=${POSTGRES_URL}" >> config.env
    - echo "POSTGRES_USER=${POSTGRES_USER}" >> config.env
    - echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> config.env
    - echo "POSTGRES_DB=${POSTGRES_DB}" >> config.env
    - echo "JWT_TOKEN=${JWT_TOKEN}" >> config.env
    - cat config.env
    - docker compose -f docker-compose-prod.yml down
    - docker compose -f docker-compose-prod.yml build
    - docker compose -f docker-compose-prod.yml up

code-analysis:
  extends:
    - .common-rule
  image: $IMAGE_OPENJDK_MVN
  stage: test
  script:
    - echo "Running SonarQube..."
    - echo "To be done..."

unit-test:
  extends:
    - .common-rule
  image: $IMAGE_OPENJDK_MVN
  stage: test
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
  script:
    - echo "Running unit tests..."
    - mvn $MAVEN_CLI_OPTS test

build-image:
  extends:
    - .after-merge-rule
  stage: build-image
  script:
    - echo "Building Docker Image..."
#    - docker build -t $CI_REGISTRY/our-docker/$CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA .
#    - docker build -t $CI_REGISTRY/our-docker/$CI_PROJECT_NAME:latest .

publish-image:
  extends:
    - .after-merge-rule
  stage: publish-image
  script:
    - echo "Publishing Docker Image..."
#    - docker login -u our-docker -p $OUR-DOCKER_CONTAINER_REGISTRY_TOKEN $CI_REGISTRY
#    - docker push $CI_REGISTRY/our-docker/$CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA
#    - docker push $CI_REGISTRY/our-docker/$CI_PROJECT_NAME:latest

pages:
  extends:
    - .after-merge-rule
  image: $IMAGE_NODE_LATEST
  stage: deploy
  cache:
    paths:
      - ./node_modules
  before_script:
    - npm install swagger-ui-dist@3.22.1
  script:
    - mkdir public
    - cp -rp node_modules/swagger-ui-dist/* public
    - cp -rp $DOCS_FOLDER/* public
    - sed -i "s#https://petstore\.swagger\.io/v2/swagger\.json#$SPEC_TO_DISPLAY#g" public/index.html
  artifacts:
    paths:
      - public

# Downstream will be triggered
deploy:
  extends:
    - .after-merge-rule
  stage: deploy
  script:
    - echo "Deployment..."
#  trigger: our-docker/our-image
